name: 🇷🇸 Srpski Fudbal — Auto Fetch Vesti

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-deploy
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repozitorijuma
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Postavi Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instaliraj zavisnosti
        run: pip install feedparser

      - name: Povuci srpske fudbalske vesti
        run: python fetch_srpski_fudbal.py

      - name: Commit i push
        run: |
          git config user.email "bot@srpskifudbal.com"
          git config user.name "SrpskiFudbal Bot"

          # Uzmi najnovije sa remote-a bez konflikta
          git fetch origin main
          git reset --soft origin/main

          # Dodaj samo nasa generisana fajla
          git add public/data/football.json index.html

          # Ako nema promena — izadji bez greske
          git diff --staged --quiet && echo "Nema promena, preskacam." && exit 0

          # Commit i direktan push
          git commit -m "🔄 Auto-update — $(date -u '+%d.%m.%Y. %H:%M UTC')"
          git push origin main
