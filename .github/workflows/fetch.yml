name: 🇷🇸 Srpski Fudbal — Auto Fetch Vesti

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: Postavi Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instaliraj zavisnosti
        run: pip install feedparser

      - name: Povuci srpske fudbalske vesti
        run: python fetch_srpski_fudbal.py

      - name: Commit i push
        run: |
          git config user.email "bot@srpskifudbal.com"
          git config user.name "SrpskiFudbal Bot"
          git add public/data/football.json index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-update — $(date -u '+%d.%m.%Y. %H:%M UTC')"
          git push

