<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red background square with rounded corners (for maskable icon) -->
  <rect width="512" height="512" fill="#CC0000" rx="80"/>

  <!-- White circle - ball base -->
  <circle cx="256" cy="256" r="190" fill="white"/>

  <!-- Serbian tricolor bands clipped to ball -->
  <clipPath id="bc"><circle cx="256" cy="256" r="190"/></clipPath>
  <g clip-path="url(#bc)">
    <rect x="66" y="66" width="380" height="127" fill="#CC0000"/>
    <rect x="66" y="193" width="380" height="126" fill="#003F8A"/>
    <rect x="66" y="319" width="380" height="127" fill="#f0f2f5"/>
  </g>

  <!-- Pentagon patches - rotated 22° for dynamic feel -->
  <g transform="rotate(22, 256, 256)" clip-path="url(#bc)">
    <!-- Center pentagon -->
    <polygon points="256,175 322,220 298,298 214,298 190,220"
      fill="rgba(255,255,255,0.35)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
    <!-- Top -->
    <polygon points="256,60 322,105 298,148 214,148 190,105"
      fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
    <!-- Upper right -->
    <polygon points="390,130 440,170 435,245 375,270 335,200"
      fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
    <!-- Lower right -->
    <polygon points="390,330 405,405 340,445 285,420 295,345"
      fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
    <!-- Lower left -->
    <polygon points="227,420 172,445 107,405 122,330 217,345"
      fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
    <!-- Upper left -->
    <polygon points="177,200 137,270 77,245 72,170 122,130"
      fill="rgba(255,255,255,0.28)" stroke="white" stroke-width="9" stroke-linejoin="round"/>
  </g>

  <!-- Ball border -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(200,200,200,0.4)" stroke-width="4"/>

  <!-- Specular highlight -->
  <ellipse cx="190" cy="170" rx="70" ry="46" fill="white" opacity="0.35" transform="rotate(-30 190 170)"/>

  <!-- "СФ" text at bottom of icon -->
  <text x="256" y="490" text-anchor="middle" font-family="Arial Black, sans-serif"
    font-size="42" font-weight="900" fill="white" letter-spacing="4">СФ</text>
</svg>
